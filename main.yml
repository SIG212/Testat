name: Finviz Scanner — Auto Scan & Deploy

on:
  schedule:
    - cron: "15 13 * * 1-5"   # 15:15 RO iarna / 16:15 RO vara
  workflow_dispatch:
    inputs:
      mode:
        description: "Mod rulare"
        required: true
        default: "scan"
        type: choice
        options:
          - scan
          - validate
          - both

env:
  PYTHON_VERSION: "3.11"

jobs:
  scan-1615:
    name: "📡 Scan — Build Watchlist"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create data directory
        run: mkdir -p data

      - name: Run scanner
        run: python scanner.py ${{ github.event.inputs.mode || 'scan' }}

      - name: Generate dashboard
        run: python generate_html.py

      - name: Commit & push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/watchlist_1615.json index.html
          if git diff --cached --quiet; then
            echo "No changes."
          else
            git commit -m "📡 Scan — $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push --force-with-lease origin HEAD
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: watchlist-${{ github.run_number }}
          path: data/watchlist_1615.json
          retention-days: 7
