name: Finviz Scanner

on:
  schedule:
    - cron: "15 13 * * 1-5"
    - cron: "45 13 * * 1-5"
  workflow_dispatch:
    inputs:
      mode:
        description: "Mod rulare"
        required: true
        default: "scan"
        type: choice
        options:
          - scan
          - validate
          - both

env:
  PYTHON_VERSION: "3.11"

jobs:
  run:
    name: "📡 Finviz Scanner"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull latest
        run: git pull origin HEAD

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create data directory
        run: mkdir -p data

      - name: Detect mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ github.event.inputs.mode }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.schedule }}" = "15 13 * * 1-5" ]; then
            echo "mode=scan" >> $GITHUB_OUTPUT
          else
            echo "mode=validate" >> $GITHUB_OUTPUT
          fi

      - name: Run scanner
        run: python scanner.py ${{ steps.mode.outputs.mode }}

      - name: Generate dashboard
        run: python generate_html.py

      - name: Commit & push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ index.html
          if git diff --cached --quiet; then
            echo "No changes."
          else
            git commit -m "🤖 ${{ steps.mode.outputs.mode }} — $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push --force-with-lease origin HEAD
          fi
